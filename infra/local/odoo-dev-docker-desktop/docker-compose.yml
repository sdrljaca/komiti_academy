name: komiti-academy-dev

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-komiti_academy_odoo_dev}
      POSTGRES_USER: ${POSTGRES_USER:-admin.komiti_odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-komiti-academy-local-dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin.komiti_odoo} -d ${POSTGRES_DB:-komiti_academy_odoo_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      academy:
        aliases:
          - db

  odoo:
    image: ${ODOO_IMAGE:-odoo:19.0}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: db
      PORT: 5432
      USER: ${POSTGRES_USER:-admin.komiti_odoo}
      PASSWORD: ${POSTGRES_PASSWORD:-komiti-academy-local-dev}
    ports:
      - "${ODOO_PORT:-8067}:8069"
    volumes:
      - odoo-data:/var/lib/odoo
      - ../../../custom-addons:/mnt/extra-addons:rw
    networks:
      academy:
        aliases:
          - odoo

volumes:
  postgres-data:
  odoo-data:

networks:
  academy: